name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}        # Changed from SERVER_IP
          username: ${{ secrets.VPS_USER }}    # Added this line
          key: ${{ secrets.VPS_SSH_KEY }}      # Changed from SSH_KEY
          script: |
            cd /team/katty
            git pull origin main
            npm install
            npm run build || true
            systemctl restart nginx